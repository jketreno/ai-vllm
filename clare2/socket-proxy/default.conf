upstream docker_socket {
    server unix:/var/run/docker.sock;
}

server {
    listen 2375;

    location ~ ^/containers/(vllm-engine|clare2-train)/json$ {
        limit_except GET {
            deny all;
        }
        proxy_pass http://docker_socket;
    }

    location = /containers/vllm-engine/logs {
        limit_except GET {
            deny all;
        }
        proxy_buffering off;
        proxy_pass http://docker_socket;
    }

    location ~ ^/containers/(vllm-engine|clare2-train)/(start|stop)$ {
        limit_except POST {
            deny all;
        }
        proxy_pass http://docker_socket;
    }

    location / {
        return 403;
    }
}
