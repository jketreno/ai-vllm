name: ai-vllm

x-clare2-env: &clare2-env
  MODELS_ROOT: /models
  CORPUS_ROOT: /corpus
  CLARE2_VLLM_URL: http://vllm-engine:8001
  CLARE2_DOCKER_PROXY_URL: http://docker-socket-proxy:2375
  CLARE2_SCHEDULER_TIMEZONE: ${CLARE2_SCHEDULER_TIMEZONE:-America/Los_Angeles}
  CLARE2_INFERENCE_MODEL: ${CLARE2_INFERENCE_MODEL:-Qwen/Qwen3.6-27B-FP8}
  CLARE2_DISTILL_MODEL: ${CLARE2_DISTILL_MODEL:-Qwen/Qwen3.6-27B-FP8}
  CLARE2_TRAIN_MODEL: ${CLARE2_TRAIN_MODEL:-Qwen/Qwen3.6-27B-FP8}
  CLARE2_MIN_TRAIN_RECORDS: ${CLARE2_MIN_TRAIN_RECORDS:-8}
  CLARE2_INFERENCE_REVISION: ${CLARE2_INFERENCE_REVISION:?pin the FP8 Hugging Face revision}
  CLARE2_TRAIN_REVISION: ${CLARE2_TRAIN_REVISION:?pin the training Hugging Face revision}
  CLARE2_BASE_ARCHITECTURE: ${CLARE2_BASE_ARCHITECTURE:-Qwen3_5ForConditionalGeneration}
  CLARE2_BASE_CONFIG_HASH: ${CLARE2_BASE_CONFIG_HASH:?set the base config SHA256}
  CLARE2_TOKENIZER_HASH: ${CLARE2_TOKENIZER_HASH:?set the tokenizer SHA256}
  CLARE2_PROJECT_MAP: ${CLARE2_PROJECT_MAP:-'{"clare":"github:jketreno/clare","ai-vllm":"ai-vllm"}'}
  CLARE2_MAX_CPU_LORAS: "8"
  CLARE2_SMTP_HOST: ${CLARE2_SMTP_HOST:?set CLARE2_SMTP_HOST in .env}
  CLARE2_SMTP_PORT: ${CLARE2_SMTP_PORT:-25}
  CLARE2_NOTIFY_FROM: ${CLARE2_NOTIFY_FROM:-}
  CLARE2_NOTIFY_TO: ${CLARE2_NOTIFY_TO:-}
  CLARE2_PROXY_TOKEN_FILE: /run/secrets/clare2_proxy_token
  CLARE2_MCP_TOKEN_FILE: /run/secrets/clare2_mcp_token
  CLARE2_OPERATOR_TOKEN_FILE: /run/secrets/clare2_operator_token
  CLARE2_CALLBACK_SECRET_FILE: /run/secrets/clare2_callback_secret
  CLARE2_CORPUS_SYNC_KEY_FILE: /run/secrets/clare2_corpus_sync_key
  CLARE2_IMAGE_LEASE_TTL: ${CLARE2_IMAGE_LEASE_TTL:-3600}
  CLARE2_IMAGE_LEASE_MIN_AVAILABLE_GIB: ${CLARE2_IMAGE_LEASE_MIN_AVAILABLE_GIB:-16}
  CLARE2_IMAGE_LEASE_MEMORY_TIMEOUT: ${CLARE2_IMAGE_LEASE_MEMORY_TIMEOUT:-120}

services:
  mlflow:
    build:
      context: clare2/mlflow
      args:
        MLFLOW_VERSION: ${CLARE2_MLFLOW_VERSION:-3.13.0}
    restart: unless-stopped
    command:
      - mlflow
      - server
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --backend-store-uri
      - sqlite:////mlflow/data/mlflow.db
      - --artifacts-destination
      - /mlflow/artifacts
      - --serve-artifacts
      - --allowed-hosts
      - ${CLARE2_MLFLOW_ALLOWED_HOSTS:?set CLARE2_MLFLOW_ALLOWED_HOSTS in .env}
      - --cors-allowed-origins
      - ${CLARE2_MLFLOW_CORS_ALLOWED_ORIGINS:?set CLARE2_MLFLOW_CORS_ALLOWED_ORIGINS in .env}
    ports:
      - "127.0.0.1:${CLARE2_MLFLOW_PORT:-5000}:5000"
    volumes:
      - ./mlflow:/mlflow
    networks: [control, operator, frontend]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    networks: [control]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  docker-socket-proxy:
    build:
      context: clare2/socket-proxy
    restart: unless-stopped
    group_add:
      - "${CLARE2_DOCKER_GID:?set CLARE2_DOCKER_GID to the group id owning /var/run/docker.sock}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [control]

  clare2-policy:
    build:
      context: clare2/pipeline
    restart: unless-stopped
    environment: *clare2-env
    ports:
      - "${CLARE2_BIND_ADDRESS:-127.0.0.1}:${CLARE2_PROXY_PORT:-8000}:8000"
      - "127.0.0.1:${CLARE2_METRICS_PORT:-9091}:9091"
    expose:
      - "9091"
    secrets:
      - clare2_proxy_token
      - clare2_operator_token
      - clare2_callback_secret
      - clare2_corpus_sync_key
    volumes:
      - ${CLARE2_CORPUS_ROOT:?set CLARE2_CORPUS_ROOT to the shared CLARE2 corpus directory}:/corpus
      - ./models:/models
      - ./logs/clare2:/logs
      - ./clare2/pipeline/config/corpus_sources.yml:/app/config/corpus_sources.yml:ro
    depends_on:
      redis:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_started
      vllm-engine:
        condition: service_healthy
    networks: [control, inference, operator]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  clare2-mcp:
    build:
      context: clare2/pipeline
    restart: unless-stopped
    command: ["python", "-m", "app.mcp_server"]
    environment: *clare2-env
    ports:
      - "${CLARE2_BIND_ADDRESS:-127.0.0.1}:${CLARE2_MCP_PORT:-8002}:8002"
    secrets:
      - clare2_mcp_token
      - clare2_callback_secret
    volumes:
      - ./models:/models:ro
    depends_on:
      clare2-policy:
        condition: service_healthy
    networks: [control, operator]

  vllm-engine:
    image: nvcr.io/nvidia/vllm:26.06-py3
    container_name: vllm-engine
    restart: unless-stopped
    gpus: all
    ipc: host
    expose: ["8001"]
    environment:
      VLLM_ALLOW_RUNTIME_LORA_UPDATING: "True"
      VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS: "1"
      VLLM_MARLIN_USE_ATOMIC_ADD: "1"
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
    volumes:
      - ${CLARE2_MODEL_CACHE:-./models/huggingface}:/root/.cache/huggingface/hub:ro
      - ./models:/models:ro
    networks: [inference]
    ulimits:
      memlock: -1
      stack: 67108864
    command:
      - vllm
      - serve
      - ${CLARE2_INFERENCE_MODEL:-Qwen/Qwen3.6-27B-FP8}
      - --revision
      - ${CLARE2_INFERENCE_REVISION}
      - -O3
      - --port
      - "8001"
      - --tensor-parallel-size
      - "1"
      - --gpu-memory-utilization
      - "${CLARE2_GPU_MEMORY_UTILIZATION:-0.45}"
      - --max-model-len
      - "${CLARE2_MAX_MODEL_LEN:-131072}"
      - --kv-cache-dtype
      - fp8
      # Favor interactive decode latency: excess requests queue instead of
      # allowing concurrent long prefills to starve token generation.
      # KV cache pool (gpu-memory-utilization 0.45) profiles at 20.07 GiB,
      # good for ~3.98x concurrency at the full 131072-token max-model-len,
      # so raising this from 2 to 4 fits the existing pool at ~0 extra
      # memory cost. Each additional full-context slot beyond ~4 costs
      # ~5 GiB and requires raising gpu-memory-utilization.
      - --max-num-seqs
      - "${CLARE2_MAX_NUM_SEQS:-4}"
      - --max-num-batched-tokens
      - "${CLARE2_MAX_NUM_BATCHED_TOKENS:-8192}"
      - --reasoning-parser=qwen3
      - --reasoning-config
      - '{"reasoning_start_str":"<think>","reasoning_end_str":"</think>"}'
      - --enable-chunked-prefill
      - --enable-auto-tool-choice
      - --tool-call-parser=qwen3_coder
      - --enable-prefix-caching
      - --enable-lora
      - --max-lora-rank
      - "32"
      - --max-loras
      - "2"
      - --max-cpu-loras
      - "8"
      - --trust-remote-code
      - --default-chat-template-kwargs
      - '{"preserve_thinking": true}'
      - --speculative-config
      - '{"method": "mtp", "num_speculative_tokens": 3}'
      - --generation-config
      - auto
      - --override-generation-config
      - '{"temperature": 0.6, "top_p": 0.95, "top_k": 20}'
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 900s

  spam-classifier:
    build: spam-classifier
    restart: unless-stopped
    environment:
      SPAM_MODEL: ${CLARE2_INFERENCE_MODEL:-Qwen/Qwen3.6-27B-FP8}
      SPAM_VLLM_URL: http://vllm-engine:8001
      SPAM_THRESHOLD: ${SPAM_THRESHOLD:-0.80}
      SPAM_MAX_MESSAGE_CHARS: ${SPAM_MAX_MESSAGE_CHARS:-60000}
      SPAM_API_TOKEN_FILE: /run/secrets/spam_api_token
    secrets:
      - spam_api_token
    ports:
      - "${SPAM_API_PORT:-8003}:8000"
    depends_on:
      vllm-engine:
        condition: service_healthy
    networks: [inference, operator]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  sam3-worker:
    profiles: [sam3]
    build:
      context: .
      dockerfile: sam3/Dockerfile
    gpus: all
    ipc: host
    restart: unless-stopped
    environment:
      HF_TOKEN_FILE: /run/secrets/huggingface_token
      LOG_LEVEL: ${SAM3_LOG_LEVEL:-INFO}
      SAM3_PLATFORM: ${SAM3_PLATFORM:-gb10}
      SAM3_GB10_PRECISION: ${SAM3_GB10_PRECISION:-bf16}
      SAM3_RESOLUTION: ${SAM3_RESOLUTION:-1008}
    secrets:
      - huggingface_token
    volumes:
      - ${CLARE2_MODEL_CACHE:-./models/huggingface}:/root/.cache/huggingface
    expose:
      - "8004"
      - "9092"
    networks: [inference, monitoring]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 600s

  qwen-image-edit-worker:
    build:
      context: .
      dockerfile: qwen-image-edit/Dockerfile
    gpus: all
    ipc: host
    restart: unless-stopped
    environment:
      HF_TOKEN_FILE: /run/secrets/huggingface_token
      QWEN_IMAGE_EDIT_PROFILE: ${QWEN_IMAGE_EDIT_PROFILE:-base}
      QWEN_IMAGE_EDIT_INFERENCE_REQUIRED_GIB: ${QWEN_IMAGE_EDIT_INFERENCE_REQUIRED_GIB:-16}
      QWEN_IMAGE_EDIT_PROGRESS_RETENTION_SECONDS: ${QWEN_IMAGE_EDIT_PROGRESS_RETENTION_SECONDS:-86400}
      QWEN_IMAGE_EDIT_LIGHTNING_REPO: ${QWEN_IMAGE_EDIT_LIGHTNING_REPO:-lightx2v/Qwen-Image-Edit-2511-Lightning}
      QWEN_IMAGE_EDIT_LIGHTNING_WEIGHT: ${QWEN_IMAGE_EDIT_LIGHTNING_WEIGHT:-Qwen-Image-Edit-2511-Lightning-4steps-V1.0-fp32.safetensors}
    secrets:
      - huggingface_token
    ulimits:
      memlock: -1
      stack: 67108864
    volumes:
      - ${CLARE2_MODEL_CACHE:-./models/huggingface}:/root/.cache/huggingface
      - qwen-image-edit-state:/app/state
    expose:
      - "8006"
      - "9093"
    networks: [inference, monitoring]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 1800s

  image-api:
    build:
      context: .
      dockerfile: image-api/Dockerfile
    restart: unless-stopped
    environment:
      SAM3_WORKER_URL: ${SAM3_WORKER_URL:-http://sam3-worker:8004}
      QWEN_IMAGE_EDIT_WORKER_URL: http://qwen-image-edit-worker:8006
      IMAGE_API_POLICY_URL: http://clare2-policy:8000/v1
      IMAGE_API_POLICY_HEALTH_URL: http://clare2-policy:8000/health
      IMAGE_API_POLICY_TOKEN_FILE: /run/secrets/clare2_proxy_token
      IMAGE_API_RESOURCE_LEASE_URL: http://clare2-policy:8000/operator/resource-leases/image-edit
      IMAGE_API_RESOURCE_LEASE_TOKEN_FILE: /run/secrets/clare2_operator_token
      IMAGE_API_EXCLUSIVE_VLLM: ${IMAGE_API_EXCLUSIVE_VLLM:-false}
      IMAGE_API_VISION_MODEL: ${CLARE2_INFERENCE_MODEL:-Qwen/Qwen3.6-27B-FP8}
      IMAGE_API_MAX_UPLOAD_BYTES: ${IMAGE_API_MAX_UPLOAD_BYTES:-52428800}
      IMAGE_API_METRICS_PORT: ${IMAGE_API_METRICS_PORT:-9094}
      IMAGE_API_AUTH_ISSUER: ${AUTO_SAM_AUTH_ISSUER:-auto-sam}
      IMAGE_API_AUTH_AUDIENCE: ${AUTO_SAM_AUTH_AUDIENCE:-image-api}
      IMAGE_API_AUTH_TOKEN_SECRET_FILE: /run/secrets/auto_sam_auth_token
      IMAGE_API_OPENWEBUI_TOKEN_FILE: /run/secrets/image_api_openwebui_token
    secrets:
      - clare2_proxy_token
      - clare2_operator_token
      - auto_sam_auth_token
      - image_api_openwebui_token
    ports:
      - "${IMAGE_API_BIND_ADDRESS:-127.0.0.1}:${IMAGE_API_PORT:-8005}:8000"
    expose:
      - "9094"
    depends_on:
      clare2-policy:
        condition: service_healthy
    networks: [inference, frontend, monitoring]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')"]
      interval: 30s
      timeout: 5s
      retries: 3

  clare2-train:
    container_name: clare2-train
    build:
      context: clare2/train
    restart: "no"
    gpus: all
    ipc: host
    environment:
      <<: *clare2-env
      CLARE2_PROJECT_ID: ${CLARE2_PROJECT_ID:-global}
      CLARE2_PIPELINE_URL: http://clare2-policy:8000
      CLARE2_TRAIN_SKIP_CALLBACK: ${CLARE2_TRAIN_SKIP_CALLBACK:-0}
      CLARE2_TRAIN_MLFLOW_DISABLED: ${CLARE2_TRAIN_MLFLOW_DISABLED:-0}
      CLARE2_MIN_TRAIN_RECORDS: ${CLARE2_MIN_TRAIN_RECORDS:-1}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT_NAME: ${CLARE2_MLFLOW_EXPERIMENT:-clare2-qlora}
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      BNB_CUDA_VERSION: "${CLARE2_BNB_CUDA_VERSION:-130}"
    secrets:
      - clare2_callback_secret
    volumes:
      - ${CLARE2_MODEL_CACHE:-./models/huggingface}:/root/.cache/huggingface/hub
      - ${CLARE2_CORPUS_ROOT:?set CLARE2_CORPUS_ROOT to the shared CLARE2 corpus directory}:/corpus:ro
      - ./models:/models
    networks: [control]
    depends_on:
      mlflow:
        condition: service_healthy
    ulimits:
      memlock: -1
      stack: 67108864

  open-webui:
    build:
      context: open-webui
      dockerfile: Dockerfile.open-webui
    restart: unless-stopped
    environment:
      OPENAI_API_BASE_URL: http://clare2-policy:8000/v1
      OPENAI_API_KEY_FILE: /run/secrets/clare2_proxy_token
      LDAP_APP_PASSWORD_FILE: /run/secrets/ldap_app_password
      ENABLE_LDAP: ${ENABLE_LDAP:-False}
      LDAP_SERVER_HOST: ${LDAP_SERVER_HOST:-ldap.example.com}
      LDAP_SERVER_PORT: ${LDAP_SERVER_PORT:-636}
      LDAP_USE_TLS: ${LDAP_USE_TLS:-True}
      LDAP_APP_DN: ${LDAP_APP_DN:-}
      LDAP_SEARCH_BASE: ${LDAP_SEARCH_BASE:-}
      LDAP_SEARCH_FILTER: ${LDAP_SEARCH_FILTER:-(uid=%(user)s)}
      LDAP_ATTRIBUTE_FOR_USERNAME: ${LDAP_ATTRIBUTE_FOR_USERNAME:-uid}
      LDAP_ATTRIBUTE_FOR_MAIL: ${LDAP_ATTRIBUTE_FOR_MAIL:-mail}
      ENABLE_IMAGE_GENERATION: ${ENABLE_IMAGE_GENERATION:-True}
      IMAGE_GENERATION_ENGINE: openai
      IMAGES_OPENAI_API_BASE_URL: http://image-api:8000/openai/v1
      IMAGES_OPENAI_API_KEY_FILE: /run/secrets/image_api_openwebui_token
      IMAGE_GENERATION_MODEL: ${IMAGE_GENERATION_MODEL:-qwen-image-edit}
      IMAGE_SIZE: ${IMAGE_SIZE:-1024x1024}
      IMAGE_STEPS: ${IMAGE_STEPS:-20}
      ENABLE_IMAGE_EDIT: ${ENABLE_IMAGE_EDIT:-True}
      IMAGE_EDIT_ENGINE: openai
      IMAGES_EDIT_OPENAI_API_BASE_URL: http://image-api:8000/openai/v1
      IMAGES_EDIT_OPENAI_API_KEY_FILE: /run/secrets/image_api_openwebui_token
      IMAGE_EDIT_MODEL: ${IMAGE_EDIT_MODEL:-qwen-image-edit}
    secrets:
      - clare2_proxy_token
      - ldap_app_password
      - image_api_openwebui_token
    ports: ["8080:8080"]
    volumes:
      - ${OPEN_WEBUI_DATA_DIR:-./open-webui/data}:/app/backend/data
    networks: [control, frontend]
    depends_on:
      image-api:
        condition: service_healthy

  ollama:
    image: ollama/ollama:0.32.1
    restart: unless-stopped
    gpus: all
    ports: ["127.0.0.1:${OLLAMA_PORT:-11434}:11434"]
    environment:
      OLLAMA_KEEP_ALIVE: -1
      OLLAMA_MAX_LOADED_MODELS: 1
    volumes:
      - ollama_data:/root/.ollama
    networks: [frontend]
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/11434 && printf 'GET /api/tags HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200 OK'"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3

  qdrant:
    image: qdrant/qdrant:v1.13.6
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks: [frontend]
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/6333 && printf 'GET /healthz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200 OK'"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3

  nginx:
    build: nginx
    restart: unless-stopped
    environment:
      AUTO_SAM_UPSTREAM_HOST: ${AUTO_SAM_UPSTREAM_HOST:?set AUTO_SAM_UPSTREAM_HOST in .env}
      OPEN_WEBUI_UPSTREAM_HOST: ${OPEN_WEBUI_UPSTREAM_HOST:?set OPEN_WEBUI_UPSTREAM_HOST in .env}
      NGINX_ENVSUBST_FILTER: ^(AUTO_SAM_UPSTREAM_HOST|OPEN_WEBUI_UPSTREAM_HOST)$
    ports: ["80:80"]
    volumes:
      - ./logs:/var/log/nginx
    networks: [frontend, monitoring]

  prometheus:
    image: prom/prometheus:v3.4.1
    restart: unless-stopped
    environment:
      COMFYUI_METRICS_TARGET: ${COMFYUI_METRICS_TARGET:?set COMFYUI_METRICS_TARGET in .env}
    entrypoint: ["/bin/sh", "/etc/prometheus/render-config.sh"]
    depends_on:
      model-memory-exporter:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - --config.file=/tmp/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.route-prefix=/
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml.template:ro
      - ./monitoring/prometheus/render-config.sh:/etc/prometheus/render-config.sh:ro
      - prometheus_data:/prometheus
    expose:
      - "9090"
    networks: [operator, inference, monitoring]

  grafana:
    image: grafana/grafana:12.0.2
    restart: unless-stopped
    environment:
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:?set GRAFANA_ROOT_URL in .env}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    secrets:
      - grafana_admin_password
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    expose:
      - "3000"
    networks: [monitoring]
    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter:v1.9.1
    restart: unless-stopped
    pid: host
    network_mode: host
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro,rslave

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    restart: unless-stopped
    privileged: true
    command:
      - --docker_only=true
      - --housekeeping_interval=15s
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    expose:
      - "8080"
    networks: [monitoring]

  model-memory-exporter:
    build: monitoring/model-memory
    restart: unless-stopped
    environment:
      DOCKER_PROXY_URL: http://docker-socket-proxy:2375
      VLLM_CONTAINER: vllm-engine
      VLLM_MODEL: ${CLARE2_INFERENCE_MODEL:-Qwen/Qwen3.6-27B-FP8}
    expose:
      - "9836"
    depends_on:
      docker-socket-proxy:
        condition: service_started
    networks: [control, monitoring]

  nvidia-exporter:
    build:
      context: monitoring/nvidia-exporter
    restart: unless-stopped
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
    expose:
      - "9835"
    networks: [monitoring]

networks:
  control:
    internal: true
  inference:
    internal: true
  operator: {}
  frontend: {}
  monitoring: {}

volumes:
  ollama_data: {}
  qdrant_storage: {}
  prometheus_data: {}
  grafana_data: {}
  qwen-image-edit-state: {}

secrets:
  huggingface_token:
    file: ${HF_TOKEN_FILE:-./secrets/huggingface_token}
  ldap_app_password:
    file: ${LDAP_APP_PASSWORD_FILE:-./secrets/ldap_app_password}
  clare2_proxy_token:
    file: ${CLARE2_PROXY_TOKEN_FILE:-./secrets/clare2_proxy_token}
  clare2_mcp_token:
