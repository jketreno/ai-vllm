name: ai-vllm

x-clare2-env: &clare2-env
  MODELS_ROOT: /models
  CORPUS_ROOT: /corpus
  CLARE2_VLLM_URL: http://vllm-engine:8001
  CLARE2_DOCKER_PROXY_URL: http://docker-socket-proxy:2375
  CLARE2_INFERENCE_MODEL: ${CLARE2_INFERENCE_MODEL:-Qwen/Qwen3.5-35B-A3B-FP8}
  CLARE2_DISTILL_MODEL: ${CLARE2_DISTILL_MODEL:-Qwen/Qwen3.5-35B-A3B-FP8}
  CLARE2_TRAIN_MODEL: ${CLARE2_TRAIN_MODEL:-Qwen/Qwen3.5-35B-A3B}
  CLARE2_INFERENCE_REVISION: ${CLARE2_INFERENCE_REVISION:?pin the FP8 Hugging Face revision}
  CLARE2_TRAIN_REVISION: ${CLARE2_TRAIN_REVISION:?pin the matching non-FP8 Hugging Face revision}
  CLARE2_BASE_CONFIG_HASH: ${CLARE2_BASE_CONFIG_HASH:?set the base config SHA256}
  CLARE2_TOKENIZER_HASH: ${CLARE2_TOKENIZER_HASH:?set the tokenizer SHA256}
  CLARE2_PROJECT_MAP: ${CLARE2_PROJECT_MAP:-{"clare":"github:jketreno/clare"}}
  CLARE2_MAX_CPU_LORAS: "8"
  CLARE2_PROXY_TOKEN_FILE: /run/secrets/clare2_proxy_token
  CLARE2_MCP_TOKEN_FILE: /run/secrets/clare2_mcp_token
  CLARE2_OPERATOR_TOKEN_FILE: /run/secrets/clare2_operator_token
  CLARE2_CALLBACK_SECRET_FILE: /run/secrets/clare2_callback_secret

services:
  mlflow:
    build:
      context: clare2/mlflow
      args:
        MLFLOW_VERSION: ${CLARE2_MLFLOW_VERSION:-3.13.0}
    restart: unless-stopped
    command:
      - mlflow
      - server
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --backend-store-uri
      - sqlite:////mlflow/data/mlflow.db
      - --artifacts-destination
      - /mlflow/artifacts
      - --serve-artifacts
      - --allowed-hosts
      - mlflow:*,localhost:*,127.0.0.1:*
    ports:
      - "127.0.0.1:${CLARE2_MLFLOW_PORT:-5000}:5000"
    volumes:
      - ./mlflow:/mlflow
    networks: [control, operator]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    networks: [control]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  docker-socket-proxy:
    build:
      context: clare2/socket-proxy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [control]

  clare2-policy:
    build:
      context: clare2/pipeline
    restart: unless-stopped
    environment: *clare2-env
    ports:
      - "${CLARE2_BIND_ADDRESS:-127.0.0.1}:${CLARE2_PROXY_PORT:-8000}:8000"
      - "127.0.0.1:${CLARE2_METRICS_PORT:-9091}:9091"
    secrets:
      - clare2_proxy_token
      - clare2_operator_token
      - clare2_callback_secret
    volumes:
      - ./corpus:/corpus
      - ./models:/models
      - ./logs/clare2:/logs
    depends_on:
      redis:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_started
      vllm-engine:
        condition: service_healthy
    networks: [control, inference, operator]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  clare2-mcp:
    build:
      context: clare2/pipeline
    restart: unless-stopped
    command: ["python", "-m", "app.mcp_server"]
    environment: *clare2-env
    ports:
      - "${CLARE2_BIND_ADDRESS:-127.0.0.1}:${CLARE2_MCP_PORT:-8002}:8002"
    secrets:
      - clare2_mcp_token
      - clare2_callback_secret
    volumes:
      - ./models:/models:ro
    depends_on:
      clare2-policy:
        condition: service_healthy
    networks: [control, operator]

  vllm-engine:
    image: nvcr.io/nvidia/vllm:26.04-py3
    container_name: vllm-engine
    restart: unless-stopped
    gpus: all
    ipc: host
    expose: ["8001"]
    environment:
      VLLM_ALLOW_RUNTIME_LORA_UPDATING: "True"
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
    volumes:
      - ${CLARE2_MODEL_CACHE:-./models/huggingface}:/root/.cache/huggingface/hub:ro
      - ./models:/models:ro
    networks: [inference]
    ulimits:
      memlock: -1
      stack: 67108864
    command:
      - vllm
      - serve
      - ${CLARE2_INFERENCE_MODEL:-Qwen/Qwen3.5-35B-A3B-FP8}
      - --revision
      - ${CLARE2_INFERENCE_REVISION}
      - --port
      - "8001"
      - --tensor-parallel-size
      - "1"
      - --enable-expert-parallel
      - --gpu-memory-utilization
      - "${CLARE2_GPU_MEMORY_UTILIZATION:-0.76}"
      - --max-model-len
      - "131072"
      - --kv-cache-dtype
      - fp8
      - --reasoning-parser=qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser=qwen3_coder
      - --enable-prefix-caching
      - --max-num-batched-tokens
      - "4096"
      - --enable-lora
      - --max-lora-rank
      - "32"
      - --max-loras
      - "2"
      - --max-cpu-loras
      - "8"
      - --trust-remote-code
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

  spam-vllm:
    image: nvcr.io/nvidia/vllm:26.04-py3
    container_name: spam-vllm
    restart: unless-stopped
    gpus: all
    ipc: host
    expose: ["8001"]
    environment:
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
    volumes:
      - ${CLARE2_MODEL_CACHE:-./models/huggingface}:/root/.cache/huggingface/hub:ro
    depends_on:
      vllm-engine:
        condition: service_healthy
    networks: [spam]
    ulimits:
      memlock: -1
      stack: 67108864
    command:
      - vllm
      - serve
      - ${SPAM_MODEL:-Qwen/Qwen3.5-4B}
      - --revision
      - ${SPAM_MODEL_REVISION:?pin the spam model Hugging Face revision}
      - --port
      - "8001"
      - --gpu-memory-utilization
      - "${SPAM_GPU_MEMORY_UTILIZATION:-0.20}"
      - --max-model-len
      - "${SPAM_MAX_MODEL_LEN:-16384}"
      - --enable-prefix-caching
      - --max-num-batched-tokens
      - "4096"
      - --trust-remote-code
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  spam-classifier:
    build: spam-classifier
    restart: unless-stopped
    environment:
      SPAM_MODEL: ${SPAM_MODEL:-Qwen/Qwen3.5-4B}
      SPAM_VLLM_URL: http://spam-vllm:8001
      SPAM_THRESHOLD: ${SPAM_THRESHOLD:-0.80}
      SPAM_MAX_MESSAGE_CHARS: ${SPAM_MAX_MESSAGE_CHARS:-60000}
      SPAM_API_TOKEN_FILE: /run/secrets/spam_api_token
    secrets:
      - spam_api_token
    ports:
      - "${SPAM_BIND_ADDRESS:-127.0.0.1}:${SPAM_API_PORT:-8003}:8000"
    depends_on:
      spam-vllm:
        condition: service_healthy
    networks: [spam, operator]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  clare2-train:
    container_name: clare2-train
    build:
      context: clare2/train
    profiles: [training]
    gpus: all
    ipc: host
    environment:
      <<: *clare2-env
      CLARE2_PROJECT_ID: ${CLARE2_PROJECT_ID:-global}
      CLARE2_PIPELINE_URL: http://clare2-policy:8000
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT_NAME: ${CLARE2_MLFLOW_EXPERIMENT:-clare2-qlora}
    secrets:
      - clare2_callback_secret
    volumes:
      - ${CLARE2_MODEL_CACHE:-./models/huggingface}:/root/.cache/huggingface/hub
      - ./corpus:/corpus:ro
      - ./models:/models
    networks: [control]
    depends_on:
      mlflow:
        condition: service_healthy
    ulimits:
      memlock: -1
      stack: 67108864

  open-webui:
    build:
      context: open-webui
      dockerfile: Dockerfile.open-webui
    restart: unless-stopped
    environment:
      OPENAI_API_BASE_URL: http://clare2-policy:8000/v1
      OPENAI_API_KEY_FILE: /run/secrets/clare2_proxy_token
      LDAP_APP_PASSWORD_FILE: /run/secrets/ldap_app_password
      ENABLE_LDAP: ${ENABLE_LDAP:-False}
      LDAP_SERVER_HOST: ${LDAP_SERVER_HOST:-ldap.example.com}
      LDAP_SERVER_PORT: ${LDAP_SERVER_PORT:-636}
      LDAP_USE_TLS: ${LDAP_USE_TLS:-True}
      LDAP_APP_DN: ${LDAP_APP_DN:-}
      LDAP_SEARCH_BASE: ${LDAP_SEARCH_BASE:-}
      LDAP_SEARCH_FILTER: ${LDAP_SEARCH_FILTER:-(uid=%(user)s)}
      LDAP_ATTRIBUTE_FOR_USERNAME: ${LDAP_ATTRIBUTE_FOR_USERNAME:-uid}
      LDAP_ATTRIBUTE_FOR_MAIL: ${LDAP_ATTRIBUTE_FOR_MAIL:-mail}
    secrets:
      - clare2_proxy_token
      - ldap_app_password
    ports: ["8080:8080"]
    volumes:
      - open-webui:/app/backend/data
    networks: [control, frontend]

  ollama:
    image: ollama/ollama:0.9.0
    restart: unless-stopped
    gpus: all
    ports: ["127.0.0.1:${OLLAMA_PORT:-11434}:11434"]
    volumes:
      - ollama_data:/root/.ollama
    networks: [frontend]
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/11434 && printf 'GET /api/tags HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200 OK'"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3

  qdrant:
    image: qdrant/qdrant:v1.13.6
    restart: unless-stopped
    ports:
      - "127.0.0.1:${QDRANT_PORT:-6333}:6333"
      - "127.0.0.1:${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks: [frontend]
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/6333 && printf 'GET /healthz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200 OK'"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3

  nginx:
    build: nginx
    restart: unless-stopped
    ports: ["80:80"]
    volumes:
      - ./logs:/var/log/nginx
    networks: [frontend]

networks:
  control:
    internal: true
  inference:
    internal: true
  spam:
    internal: true
  operator: {}
  frontend: {}

volumes:
  open-webui: {}
  ollama_data: {}
  qdrant_storage: {}

secrets:
  ldap_app_password:
    file: ${LDAP_APP_PASSWORD_FILE:-./secrets/ldap_app_password}
  clare2_proxy_token:
    file: ${CLARE2_PROXY_TOKEN_FILE:-./secrets/clare2_proxy_token}
  clare2_mcp_token:
    file: ${CLARE2_MCP_TOKEN_FILE:-./secrets/clare2_mcp_token}
  clare2_operator_token:
    file: ${CLARE2_OPERATOR_TOKEN_FILE:-./secrets/clare2_operator_token}
  clare2_callback_secret:
    file: ${CLARE2_CALLBACK_SECRET_FILE:-./secrets/clare2_callback_secret}
  spam_api_token:
    file: ${SPAM_API_TOKEN_FILE:-./secrets/spam_api_token}
