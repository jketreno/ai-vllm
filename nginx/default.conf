# Use Docker's internal DNS resolver so that hostnames like ai.ketrenos.com can be resolved
resolver 127.0.0.11 valid=30s;
resolver_timeout 5s;

# Custom log format including request_time and upstream_response_time for status metrics
log_format ketrenet '$remote_addr - $remote_user [$time_local] "$request" '
                     '$status $body_bytes_sent $request_time $upstream_response_time '
                     '"$http_referer" "$http_user_agent"';
                     
server {
    listen 80;

    location /mlflow/ {
        set $mlflow_backend "mlflow";
        rewrite ^/mlflow/(.*)$ /$1 break;
        proxy_pass http://$mlflow_backend:5000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /mlflow;
    }

    location /ollama/ {
        set $ollama_backend "ollama";
        rewrite ^/ollama/(.*)$ /$1 break;
        proxy_pass http://$ollama_backend:11434;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    location /qdrant/ {
        set $qdrant_backend "qdrant";
        rewrite ^/qdrant/(.*)$ /$1 break;
        proxy_pass http://$qdrant_backend:6333;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /grafana {
        set $grafana_backend "grafana";
        proxy_pass http://$grafana_backend:3000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location = /sam3 {
        return 301 https://$host/sam3/;
    }

    location /sam3/ {
        set $sam3_backend "sam3-annotator";
        client_max_body_size 1024m;
        proxy_pass http://$sam3_backend:8501;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    location = /sam3-demo {
        return 301 https://$host/sam3-demo/;
    }

    location /sam3-demo/ {
        set $sam3_demo_backend "sam3-demo";
        client_max_body_size 1024m;
        proxy_pass http://$sam3_demo_backend:7860;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    location / {
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;
        proxy_set_header X-NginX-Proxy true;
        proxy_pass_header Set-Cookie;
        proxy_pass_header P3P;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        set $backend "ai.ketrenos.com";
        proxy_pass http://$backend:8080;
    }
}
