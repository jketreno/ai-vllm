global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: clare2_pipeline
    static_configs:
      - targets: ['clare2-policy:9091']

  - job_name: vllm_engine
    metrics_path: /metrics
    static_configs:
      - targets: ['vllm-engine:8001']

  # Edit the target below to point at your own node-exporter host before
  # deploying the monitoring stack. See README.md "Monitoring" section.
  - job_name: node
    static_configs:
      - targets: ['REPLACE_WITH_NODE_EXPORTER_HOST:9100']

  - job_name: nvidia_gpu
    static_configs:
      - targets: ['nvidia-exporter:9835']

  - job_name: sam3
    static_configs:
      - targets: ['sam3-annotator:9092']
