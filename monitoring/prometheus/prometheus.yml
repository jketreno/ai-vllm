global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: clare2_pipeline
    static_configs:
      - targets: ['clare2-policy:9091']

  - job_name: vllm_engine
    metrics_path: /metrics
    static_configs:
      - targets: ['vllm-engine:8001']

  - job_name: node
    static_configs:
      - targets: ['host.docker.internal:9100']

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: model_memory
    static_configs:
      - targets: ['model-memory-exporter:9836']

  - job_name: nvidia_gpu
    static_configs:
      - targets: ['nvidia-exporter:9835']

  - job_name: sam3
    static_configs:
      - targets: ['sam3-worker:9092']

  - job_name: qwen_image_edit
    static_configs:
      - targets: ['qwen-image-edit-worker:9093']

  - job_name: image_api
    static_configs:
      - targets: ['image-api:9094']

  - job_name: comfyui_flux_arc
    metrics_path: /metrics
    static_configs:
      - targets: ['__COMFYUI_METRICS_TARGET__']
